services:
  - type: web
    name: clinica-pimentel-crm
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: CLINICA_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
